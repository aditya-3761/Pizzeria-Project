<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzeria - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <img src="pizzalogo.png" alt="Pizzeria Logo">
                <a href="home.html" class="site-name">Pizzeria</a>
            </div>
            <div class="nav-links">
                <a href="home.html">Home</a>
                <a href="#">Location</a>
                <a href="login.html">Login</a>
                <a href="registration.html">Register</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1>Log In</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Log In</button>
        </form>
        <p><a href="forgot.html" class="link">Forgot Password?</a></p>
        <p>Don't have an account? <a href="registration.html" class="link">Sign Up</a></p>
        <p><a href="dashboard.html" class="link">Visit without login</a></p>
        
        <hr>
        <button id="admin-login-btn" class="btn btn-secondary">Login as Admin</button>
    </div>

    <div class="modal-overlay" id="admin-modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-modal-btn">&times;</span>
            <h2>Admin Login</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-password">Admin Password</label>
                    <input type="password" id="admin-password" required>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        // Admin Login Logic
        const adminLoginBtn = document.getElementById('admin-login-btn');
        const adminModalOverlay = document.getElementById('admin-modal-overlay');
        const adminLoginForm = document.getElementById('admin-login-form');
        const closeModalBtn = document.querySelector('.close-modal-btn');
    
        if (adminLoginBtn) {
            adminLoginBtn.addEventListener('click', () => {
                adminModalOverlay.style.display = 'flex';
            });
        }
    
        if (adminModalOverlay) {
            adminModalOverlay.addEventListener('click', (e) => {
                if (e.target === adminModalOverlay || e.target.closest('.close-modal-btn')) {
                    adminModalOverlay.style.display = 'none';
                }
            });
        }
        
        if (adminLoginForm) {
            adminLoginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('admin-password').value;
                const ADMIN_PASSWORD = '6870';
                
                if (password === ADMIN_PASSWORD) {
                    alert('Admin login successful!');
                    window.location.href = 'admin.html';
                } else {
                    alert('Invalid Password!');
                }
            });
        }
        if(closeModalBtn){
             closeModalBtn.addEventListener('click', () => {
                adminModalOverlay.style.display = 'none';
             })
        }
    </script>
</body>
</html>
